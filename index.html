<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#6f4bf2" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Treino Manu" />
  <meta name="description" content="Treinos A e B de 30 minutos para Emanoele." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>Treino da Emanoele</title>
</head>
<body>
  <div id="app" class="app-shell" aria-live="polite">
    <header class="topbar">
      <div>
        <p class="eyebrow">TREINO EM CASA</p>
        <h1>Treino da Emanoele</h1>
      </div>
      <button id="connectionButton" class="status-pill" type="button" aria-label="Ver status dos dados">
        <span class="status-dot"></span>
        <span id="connectionLabel">Iniciando…</span>
      </button>
    </header>

    <main id="view" class="view" tabindex="-1"></main>

    <nav class="bottom-nav" aria-label="Navegação principal">
      <button class="nav-item is-active" data-route="home" type="button">
        <span class="nav-icon">⌂</span><span>Hoje</span>
      </button>
      <button class="nav-item" data-route="plans" type="button">
        <span class="nav-icon">◇</span><span>Treinos</span>
      </button>
      <button class="nav-item" data-route="history" type="button">
        <span class="nav-icon">↻</span><span>Histórico</span>
      </button>
      <button class="nav-item" data-route="settings" type="button">
        <span class="nav-icon">⚙</span><span>Ajustes</span>
      </button>
    </nav>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="modalRoot"></div>

  <script src="config.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
